version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ai_resume_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - ./backend/.env

    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend

    container_name: ai_resume_frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    command: npm run dev -- --host